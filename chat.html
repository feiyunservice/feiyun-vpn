<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>在线客服 - 飞云</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #ffffff;
    color: #1a1d21;
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 32px 20px;
    gap: 16px;
  }
  .logo {
    width: 64px; height: 64px;
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0, 0, 0, 0.05);
  }
  .logo img { width: 40px; height: 40px; }
  h1 { font-size: 20px; margin: 0; font-weight: 600; }
  p { margin: 0; color: #6b7178; font-size: 14px; line-height: 1.6; max-width: 360px; }
  .spinner {
    width: 22px; height: 22px;
    margin: 0 auto 12px;
    border: 3px solid rgba(0, 0, 0, 0.12);
    border-top-color: #4f8cff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn {
    margin-top: 4px;
    padding: 12px 26px;
    border: none; border-radius: 12px;
    background: #4f8cff; color: #fff;
    font-size: 15px; font-weight: 600;
    cursor: pointer;
  }
  .btn:active { opacity: 0.85; }
  .hint { font-size: 12px; color: #9aa0a6; }
</style>
</head>
<body>
  <main class="hero">
    <div class="logo"><img src="assets/logo.svg" alt="飞云"></div>
    <h1>飞云 在线客服</h1>
    <div id="status">
      <div class="spinner"></div>
      <p>正在连接客服，请稍候…</p>
    </div>
    <button id="openBtn" class="btn" style="display:none;">打开客服对话</button>
    <p class="hint">若聊天窗口未自动弹出，请点击右下方按钮。</p>
  </main>

  <script>
    // Dedicated full-screen chat page: the mobile/desktop app opens this URL in
    // an external browser (server-delivered `csr1`) and the Libredesk widget is
    // auto-expanded so the user lands straight in the conversation.
    //
    // Auth is OPTIONAL. Pass ?jwt=<server-signed-token> to link the chat to a
    // real account. The JWT MUST be signed server-side (HS256) with the inbox
    // secret — NEVER embed that secret in this page.
    (function () {
      var params = new URLSearchParams(location.search);
      var jwt = params.get('jwt');

      window.LibredeskSettings = {
        baseURL: 'https://service.feiyun.app',
        inboxID: 'f6bb3686-29bb-4417-b055-fb94b28603e7'
      };
      if (jwt) window.LibredeskSettings.userJWT = jwt;

      var opened = false;
      function tryOpen() {
        if (opened) return;
        if (window.Libredesk && typeof window.Libredesk.show === 'function') {
          opened = true;
          window.Libredesk.show();
          var status = document.getElementById('status');
          if (status) status.style.display = 'none';
        }
      }

      // Poll for the widget API and open it as soon as it is ready.
      var poll = setInterval(function () {
        tryOpen();
        if (opened) clearInterval(poll);
      }, 300);

      // Reveal a manual fallback button if autostart is blocked/slow.
      setTimeout(function () {
        var btn = document.getElementById('openBtn');
        if (btn && !opened) btn.style.display = 'inline-block';
      }, 2500);
      document.getElementById('openBtn').addEventListener('click', function () {
        if (window.Libredesk && window.Libredesk.show) window.Libredesk.show();
      });

      // Inject widget.js AFTER LibredeskSettings is in place.
      var s = document.createElement('script');
      s.async = true;
      s.src = 'https://service.feiyun.app/widget.js';
      document.head.appendChild(s);
    })();
  </script>
</body>
</html>
