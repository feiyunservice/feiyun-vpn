<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>套餐选择 - 飞云</title>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<style>
  :root{
    --bg:#FFFFFF;--bg-raised:#FFFFFF;--bg-raised-2:#EFF6FF;
    --line:#DBEAFE;--text:#0F172A;--text-dim:#475569;--text-faint:#94A3B8;
    --amber:#0098F0;--amber-dim:#0077CC;--amber-glow:#0098F0;
    --green:#0284C7;--green-ink:#0284C7;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;--sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    --dotop:0.04;--shadow:0 30px 60px -30px rgba(0,0,0,0.1);
    --nav-bg:rgba(248,250,252,0.88);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.6;-webkit-font-smoothing:antialiased;transition:background .2s ease,color .2s ease;}
  body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 1px 1px,rgba(128,110,90,var(--dotop)) 1px,transparent 0);background-size:28px 28px;pointer-events:none;z-index:0;}
  a{color:inherit;text-decoration:none;}
  .wrap{max-width:1080px;margin:0 auto;padding:0 32px;position:relative;z-index:1;}
  ::selection{background:var(--amber);color:#FFFFFF;}

  /* NAV */
  nav{position:sticky;top:0;z-index:50;background:var(--nav-bg);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);}
  nav .wrap{display:flex;align-items:center;justify-content:space-between;height:64px;}
  .logo{font-family:var(--mono);font-weight:700;font-size:16px;display:flex;align-items:center;gap:10px;}
  .logo-icon{width:36px;height:36px;border-radius:8px;background:var(--bg-raised-2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
  .logo-icon svg{display:block;}
  .navlinks{display:flex;gap:36px;font-size:14px;color:var(--text-dim);}
  .navlinks a:hover{color:var(--text);}
  .nav-cta{font-family:var(--mono);font-size:13px;font-weight:500;background:var(--amber);color:#FFFFFF;padding:9px 18px;border-radius:6px;transition:background .15s ease;}
  .nav-cta:hover{background:var(--amber-glow);}
  .nav-right{display:flex;align-items:center;gap:16px;}
  @media(max-width:760px){.navlinks{display:none;}}

  /* SECTIONS */
  section{padding:88px 0;border-top:1px solid var(--line);}
  .section-head{max-width:600px;margin-bottom:56px;}
  .section-eyebrow{font-family:var(--mono);font-size:12px;color:var(--amber-dim);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:14px;}
  h2{font-family:var(--mono);font-size:clamp(24px,3vw,32px);font-weight:700;letter-spacing:-0.01em;}
  .section-desc{margin-top:14px;color:var(--text-dim);font-size:16px;}

  /* PRICING */
  .price-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
  .price-card{background:var(--bg-raised);border:1px solid var(--line);border-radius:12px;padding:32px 28px;display:flex;flex-direction:column;transition:border-color .15s ease,transform .15s ease;}
  .price-card:hover{border-color:var(--text-faint);transform:translateY(-2px);}
  .price-card.featured{border:1.5px solid var(--amber);background:var(--bg-raised-2);position:relative;}
  .price-badge{position:absolute;top:-12px;left:28px;background:var(--amber);color:#FFFFFF;font-family:var(--mono);font-size:11px;font-weight:700;padding:4px 10px;border-radius:5px;}
  .price-tier{font-family:var(--mono);font-size:13px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em;}
  .price-amount{font-family:var(--mono);font-size:36px;font-weight:800;margin:14px 0 4px;}
  .price-amount span{font-size:14px;color:var(--text-faint);font-weight:400;}
  .price-desc{font-size:13px;color:var(--text-dim);margin-bottom:24px;}
  .price-list{list-style:none;margin-bottom:28px;flex:1;}
  .price-list li{font-size:14px;color:var(--text-dim);padding:9px 0;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px;}
  .price-list li:first-child{border-top:none;}
  .price-list li::before{content:'+';font-family:var(--mono);color:var(--green);font-weight:700;}
  .price-btn{text-align:center;padding:12px;border-radius:7px;font-family:var(--mono);font-size:13px;font-weight:500;border:1px solid var(--line);cursor:pointer;background:transparent;color:var(--text);transition:all .15s ease;display:block;width:100%;}
  .price-card.featured .price-btn{background:var(--amber);color:#FFFFFF;border:none;}
  .price-btn:hover{border-color:var(--text-faint);}
  .price-card.featured .price-btn:hover{background:var(--amber-glow);}
  @media(max-width:820px){.price-grid{grid-template-columns:1fr;}}
  .loading{text-align:center;padding:60px 0;color:var(--text-dim);font-family:var(--mono);font-size:14px;}

  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:100;align-items:center;justify-content:center;}
  .modal-overlay.active{display:flex;}
  .modal{background:var(--bg-raised);border:1px solid var(--line);border-radius:16px;padding:36px;max-width:480px;width:90%;position:relative;box-shadow:var(--shadow);}
  .modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text-faint);cursor:pointer;font-size:20px;line-height:1;padding:4px;}
  .modal-close:hover{color:var(--text);}
  .modal h3{font-family:var(--mono);font-size:18px;font-weight:700;margin-bottom:20px;}
  .modal-step{display:none;}
  .modal-step.active{display:block;}
  .modal-info{background:var(--bg-raised-2);border:1px solid var(--line);border-radius:8px;padding:16px;margin-bottom:20px;}
  .modal-info .info-row{display:flex;justify-content:space-between;font-size:14px;padding:4px 0;}
  .modal-info .info-row .label{color:var(--text-dim);}
  .modal-info .info-row .value{font-family:var(--mono);font-weight:600;}

  /* Payment method selector */
  .pay-methods{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
  .pay-method{display:flex;align-items:center;gap:12px;padding:14px 16px;border:1.5px solid var(--line);border-radius:8px;cursor:pointer;transition:all .15s ease;background:var(--bg);}
  .pay-method:hover{border-color:var(--text-faint);}
  .pay-method.selected{border-color:var(--amber);background:var(--bg-raised-2);}
  .pay-method .radio{width:18px;height:18px;border-radius:50%;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color .15s ease;}
  .pay-method.selected .radio{border-color:var(--amber);}
  .pay-method.selected .radio::after{content:'';width:10px;height:10px;border-radius:50%;background:var(--amber);}
  .pay-method .pm-name{font-size:14px;font-weight:500;}

  .modal-btn{width:100%;padding:14px;border-radius:8px;font-family:var(--mono);font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .15s ease;background:var(--amber);color:#FFFFFF;}
  .modal-btn:hover{background:var(--amber-glow);}
  .modal-btn:disabled{opacity:0.5;cursor:not-allowed;}

  /* Result */
  .result-box{text-align:center;padding:20px 0;}
  .result-box .icon{font-size:48px;margin-bottom:16px;}
  .result-box .msg{font-size:15px;color:var(--text-dim);margin-bottom:20px;line-height:1.6;}
  .code-display{background:var(--bg-raised-2);border:1px solid var(--line);border-radius:8px;padding:16px;font-family:var(--mono);font-size:20px;font-weight:700;color:var(--amber);letter-spacing:0.05em;margin-bottom:16px;word-break:break-all;}
  .copy-btn{font-family:var(--mono);font-size:13px;padding:10px 20px;border-radius:6px;border:1px solid var(--line);background:transparent;color:var(--text);cursor:pointer;transition:all .15s ease;margin-right:8px;}
  .copy-btn:hover{border-color:var(--amber);color:var(--amber);}
  .spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--line);border-top-color:var(--amber);border-radius:50%;animation:spin .6s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* FOOTER */
  footer{padding:40px 0;border-top:1px solid var(--line);}
  footer .wrap{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--text-faint);}
  .footer-links{display:flex;gap:24px;}
  .footer-links a:hover{color:var(--text);}
  @media(max-width:600px){footer .wrap{flex-direction:column;gap:16px;text-align:center;}}
</style>
</head>

  <div class="wrap">

      <div class="section-eyebrow">Pricing</div>

<script>
(function(){
  // ── Config ──────────────────────────────────────────────────────
  var API_BASE = '/api';  // Change to your actual API URL
  var STORAGE_KEY = 'feiyun_web_device_id';
  var TURNSTILE_SITE_KEY = '0x4AAAAAADzcJqMixzWyW_xj';  // Change to your Cloudflare Turnstile site key

  // Cache config — bump CACHE_VERSION when you update packages/payment-methods on the backend
  // (this invalidates old caches for all users on their next visit).
  var CACHE_VERSION = '1';
  var CACHE_TTL = 24 * 60 * 60 * 1000; // 24 hours
  var CACHE_PREFIX = 'feiyun_cache_v' + CACHE_VERSION + '_';

  function readCache(key){
    try{
      var raw = localStorage.getItem(CACHE_PREFIX + key);
      if(!raw) return null;
      var obj = JSON.parse(raw);
      if(Date.now() - obj.t > CACHE_TTL){ localStorage.removeItem(CACHE_PREFIX + key); return null; }
      return obj.d;
    }catch(e){ return null; }
  }
  function writeCache(key, data){
    try{ localStorage.setItem(CACHE_PREFIX + key, JSON.stringify({d:data, t:Date.now()})); }catch(e){}
  }

  // ── Fallback packages (shown if API fails) ──────────────────────
  var FALLBACK = [
    {package_id:'monthly',name:'月付',duration_days:30,traffic_gb:50,price:'9.00',currency:'CNY',description:'适合短期使用或先体验一下。',max_devices:3},
    {package_id:'halfyear',name:'半年付',duration_days:180,traffic_gb:400,price:'49.00',currency:'CNY',description:'平均每月仅 ¥10.7，性价比最高。',max_devices:4},
    {package_id:'yearly',name:'年付',duration_days:365,traffic_gb:1000,price:'89.00',currency:'CNY',description:'适合全家或多设备共享使用。',max_devices:5},
  ];

  // ── State ───────────────────────────────────────────────────────
  var packages = [];
  var paymentMethods = [];
  var selectedPkg = null;
  var selectedPayMethod = null;
  var webDeviceId = null;
  var pollTimer = null;
  var captchaToken = null;
  var cfWidgetId = null;

  // ── Helpers ─────────────────────────────────────────────────────
  function uuid(){
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){
      var r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16);
    });
  }
  function getDeviceId(){
    if(webDeviceId) return webDeviceId;
    webDeviceId = localStorage.getItem(STORAGE_KEY);
    if(!webDeviceId){ webDeviceId = uuid(); localStorage.setItem(STORAGE_KEY, webDeviceId); }
    return webDeviceId;
  }
  function $(id){ return document.getElementById(id); }
  function formatPrice(pkg){
    var p = parseFloat(pkg.price);
    return '¥' + (p % 1 === 0 ? p.toFixed(0) : p.toFixed(2));
  }
  function durationLabel(days){
    if(days <= 31) return '月';
    if(days <= 93) return '季度';
    if(days <= 186) return '半年';
    return '年';
  }
  function isFeatured(idx, total){
    return total === 3 ? idx === 1 : (total > 1 ? idx === Math.floor(total/2) : false);
  }

  // ── Turnstile (human verification) ─────────────────────────
  function turnstileEnabled(){
    return TURNSTILE_SITE_KEY && TURNSTILE_SITE_KEY !== 'YOUR_SITE_KEY' && window.turnstile;
  }
  function updatePayBtn(){
    var captchaOk = !turnstileEnabled() || !!captchaToken;
    var ready = selectedPayMethod && captchaOk;
    $('payBtn').disabled = !ready;
    if(ready){
      $('payBtn').textContent = '立即支付 ' + formatPrice(selectedPkg);
    } else if(!selectedPayMethod){
      $('payBtn').textContent = '选择支付方式后继续';
    } else {
      $('payBtn').textContent = '请完成人机验证';
    }
  }
  window.onCaptchaOk = function(token){ captchaToken = token; updatePayBtn(); };
  window.onCaptchaExpire = function(){ captchaToken = null; updatePayBtn(); };
  function renderTurnstile(){
    if(!turnstileEnabled()) return;
    if(cfWidgetId !== null){ window.turnstile.reset(cfWidgetId); captchaToken = null; updatePayBtn(); return; }
    cfWidgetId = window.turnstile.render('#cfWidget', {
      sitekey: TURNSTILE_SITE_KEY,
      callback: window.onCaptchaOk,
      'expired-callback': window.onCaptchaExpire,
      'error-callback': window.onCaptchaExpire
    });
  }

  function renderPackages(pkgs){
    packages = pkgs;
    var grid = $('priceGrid');
    if(!pkgs || pkgs.length === 0){
      grid.innerHTML = '<div class="loading">暂无可用套餐</div>';
      return;
    }
    var html = '';
    pkgs.forEach(function(pkg, i){
      var featured = isFeatured(i, pkgs.length);
      var label = durationLabel(pkg.duration_days);
      html += '<div class="price-card' + (featured ? ' featured' : '') + '">';
      if(featured) html += '<div class="price-badge">最划算</div>';
      html += '<div class="price-tier">' + pkg.name + '</div>';
      html += '<div class="price-amount">' + formatPrice(pkg) + '<span>/ ' + label + '</span></div>';
      html += '<div class="price-desc">' + (pkg.description || '') + '</div>';
      html += '<ul class="price-list">';
      html += '<li>' + pkg.traffic_gb + 'G 流量</li>';
      var devs = pkg.max_devices || (pkg.duration_days <= 31 ? 3 : pkg.duration_days <= 186 ? 4 : 5);
      html += '<li>支持 ' + devs + ' 台设备</li>';
      html += '<li>全部 20+ 节点</li>';
      html += '<li>在线客服支持</li>';
      if(pkg.duration_days > 186) html += '<li>专属节点优先体验</li>';
      html += '</ul>';
      html += '<button class="price-btn" onclick="openPurchase(\'' + pkg.package_id + '\')">' + (featured ? '立即购买' : '选择' + pkg.name) + '</button>';
      html += '</div>';
    });
    grid.innerHTML = html;
  }

  // ── Load packages from API (with localStorage cache) ──────────
  function loadPackages(){
    var cached = readCache('packages');
    if(cached && cached.length){
      renderPackages(cached); // cache hit — render and stop, no network request
      return;
    }
    // cache miss or expired — fetch
    fetch(API_BASE + '/web/packages/', { cache: 'no-store' })
      .then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })
      .then(function(data){
        var list = Array.isArray(data) ? data : [];
        if(list.length) writeCache('packages', list);
        renderPackages(list.length ? list : FALLBACK);
      })
      .catch(function(){ renderPackages(FALLBACK); });
  }

  // ── Load payment methods (with localStorage cache) ──────────────
  function loadPaymentMethods(cb){
    var cached = readCache('pay_methods');
    if(cached && cached.length){
      paymentMethods = cached;
      cb(cached); // cache hit — use cached list and stop, no network request
      return;
    }
    // cache miss or expired — fetch
    fetch(API_BASE + '/web/payment-methods/', { cache: 'no-store' })
      .then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })
      .then(function(data){
        var list = Array.isArray(data) ? data : [];
        if(list.length) writeCache('pay_methods', list);
        paymentMethods = list.length ? list : [{type_id:'alipay',name:'支付宝'},{type_id:'wxpay',name:'微信支付'}];
        cb(paymentMethods);
      })
      .catch(function(){
        paymentMethods = [{type_id:'alipay',name:'支付宝'},{type_id:'wxpay',name:'微信支付'}];
        cb(paymentMethods);
      });
  }

  // ── Purchase flow ───────────────────────────────────────────────
  window.openPurchase = function(pkgId){
    selectedPkg = packages.find(function(p){ return p.package_id === pkgId; });
    if(!selectedPkg) selectedPkg = FALLBACK.find(function(p){ return p.package_id === pkgId; });
    if(!selectedPkg) return;

    selectedPayMethod = null;
    captchaToken = null;
    showStep('step-pay');
    $('payBtn').disabled = true;
    $('payBtn').textContent = '选择支付方式后继续';

    // Render package info
    $('modalInfo').innerHTML =
      '<div class="info-row"><span class="label">套餐</span><span class="value">' + selectedPkg.name + '</span></div>' +
      '<div class="info-row"><span class="label">流量</span><span class="value">' + selectedPkg.traffic_gb + ' GB</span></div>' +
      '<div class="info-row"><span class="label">时长</span><span class="value">' + selectedPkg.duration_days + ' 天</span></div>' +
      '<div class="info-row"><span class="label">价格</span><span class="value" style="color:var(--amber)">' + formatPrice(selectedPkg) + '</span></div>';

    // Load payment methods
    $('payMethods').innerHTML = '<div class="loading"><span class="spinner"></span> 加载支付方式...</div>';
    loadPaymentMethods(function(methods){
      var html = '';
      methods.forEach(function(m){
        var icon = m.type_id === 'alipay' ? '💙' : (m.type_id === 'wxpay' ? '💚' : '💳');
        html += '<div class="pay-method" data-method="' + m.type_id + '" onclick="selectPayMethod(\'' + m.type_id + '\')">';
        html += '<span class="radio"></span>';
        html += '<span class="pm-name">' + icon + ' ' + (m.name || m.type_id) + '</span>';
        html += '</div>';
      });
      $('payMethods').innerHTML = html;
    });

    $('modal').classList.add('active');
    renderTurnstile();
  };

  window.selectPayMethod = function(methodId){
    selectedPayMethod = methodId;
    document.querySelectorAll('.pay-method').forEach(function(el){
      el.classList.toggle('selected', el.getAttribute('data-method') === methodId);
    });
    updatePayBtn();
  };

  $('payBtn').addEventListener('click', function(){
    if(!selectedPkg || !selectedPayMethod) return;
    $('payBtn').disabled = true;
    $('payBtn').innerHTML = '<span class="spinner"></span> 创建订单中...';

    fetch(API_BASE + '/web/purchase/', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        package_id: selectedPkg.package_id,
        payment_method: selectedPayMethod,
        web_device_id: getDeviceId(),
        captcha_token: captchaToken || ''
      })
    })
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data.success && data.payment_url){
        showStep('step-result');
        $('resultBox').innerHTML =
          '<div class="icon">🔗</div>' +
          '<div class="msg">订单已创建，正在跳转到支付页面...<br>支付完成后请返回此页面查看激活码。</div>' +
          '<div id="pollStatus"><span class="spinner"></span> 等待支付完成...</div>';
        // Open payment in new tab
        window.open(data.payment_url, '_blank');
        // Start polling
        startPolling(data.order_no);
      } else {
        showStep('step-result');
        $('resultBox').innerHTML =
          '<div class="icon">❌</div>' +
          '<div class="msg">' + (data.message || '创建订单失败，请稍后重试') + '</div>' +
          '<button class="copy-btn" onclick="closeModal()">关闭</button>';
      }
    })
    .catch(function(e){
      showStep('step-result');
      $('resultBox').innerHTML =
        '<div class="icon">❌</div>' +
        '<div class="msg">网络错误，请检查网络后重试</div>' +
        '<button class="copy-btn" onclick="closeModal()">关闭</button>';
    });
  });

  // ── Poll order status ───────────────────────────────────────────
  function startPolling(orderNo){
    var attempts = 0;
    var maxAttempts = 120; // 5 minutes at 2.5s interval
    pollTimer = setInterval(function(){
      attempts++;
      if(attempts > maxAttempts){
        clearInterval(pollTimer);
        $('pollStatus').innerHTML = '<span style="color:var(--text-faint)">支付超时，请检查支付状态后刷新页面</span>';
        return;
      }
      fetch(API_BASE + '/web/order-status/' + orderNo + '/?web_device_id=' + getDeviceId())
        .then(function(r){ return r.json(); })
        .then(function(data){
          if(data.status === 'paid' && data.activation_code){
            clearInterval(pollTimer);
            $('resultBox').innerHTML =
              '<div class="icon">🎉</div>' +
              '<div class="msg">支付成功！你的激活码：</div>' +
              '<div class="code-display">' + data.activation_code + '</div>' +
              '<button class="copy-btn" onclick="copyCode(\'' + data.activation_code + '\')">复制激活码</button>' +
              '<a href="tutorial.html" class="copy-btn" style="text-decoration:none;">打开飞云激活 →</a>';
          } else if(data.status === 'failed' || data.status === 'expired'){
            clearInterval(pollTimer);
            $('pollStatus').innerHTML = '<span style="color:var(--text-faint)">订单已' + (data.status === 'expired' ? '过期' : '失败') + '</span>';
          }
          // else keep polling (pending)
        })
        .catch(function(){}); // silently retry
    }, 2500);
  }

  window.copyCode = function(code){
    navigator.clipboard.writeText(code).then(function(){
      var btn = event.target;
      var orig = btn.textContent;
      btn.textContent = '已复制!';
      btn.style.borderColor = 'var(--green)';
      btn.style.color = 'var(--green)';
      setTimeout(function(){ btn.textContent = orig; btn.style.borderColor = ''; btn.style.color = ''; }, 2000);
    });
  };

  // ── Modal helpers ───────────────────────────────────────────────
  function showStep(id){
    document.querySelectorAll('.modal-step').forEach(function(el){ el.classList.remove('active'); });
    $(id).classList.add('active');
  }
  window.closeModal = function(){
    $('modal').classList.remove('active');
    if(pollTimer) clearInterval(pollTimer);
  };
  $('modalClose').addEventListener('click', closeModal);
  $('modal').addEventListener('click', function(e){ if(e.target === $('modal')) closeModal(); });

  // ── Init ────────────────────────────────────────────────────────
  loadPackages();
})();
</script>
</body>
</html>
