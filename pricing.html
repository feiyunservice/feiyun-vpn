<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>套餐选择 - 飞云</title>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<link rel="stylesheet" href="assets/pricing.css">
</head>
<body>

<nav>
  <div class="wrap">
    <a href="index.html" class="logo">
      <span class="logo-icon">
        <img src="assets/logo.svg" alt="飞云" width="28" height="28">
      </span>
      飞云
    </a>
    <div class="navlinks">
      <a href="index.html#features">功能</a>
      <a href="pricing.html">价格</a>
      <a href="tutorial.html">使用方法</a>
      <a href="tutorial.html#faq">常见问题</a>
    </div>
    <div class="nav-right">
      <a href="#" id="myOrdersBtn" class="nav-cta" style="background:transparent;color:var(--text);border:1px solid var(--line);">已购订单</a>
      <button class="nav-toggle" id="navToggle" aria-label="展开导航">☰</button>
    </div>
  </div>
</nav>

<section id="pricing">
  <div class="wrap">
    <div class="section-head">
      <div class="section-eyebrow">Pricing</div>
      <h2>套餐选择</h2>
      <p class="section-desc">购买套餐激活码在客户端激活使用。</p>
    </div>
    <div class="price-grid" id="priceGrid">
      <div class="loading"><span class="spinner"></span> 加载套餐中...</div>
    </div>
  </div>
</section>

<!-- Purchase Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" id="modalClose">&times;</button>

    <!-- Step 1: Select payment method -->
    <div class="modal-step active" id="step-pay">
      <h3>确认购买</h3>
      <div class="modal-info" id="modalInfo"></div>
      <div class="pay-methods" id="payMethods">
        <div class="loading"><span class="spinner"></span> 加载支付方式...</div>
      </div>
      <div id="cfWidget" style="margin-bottom:20px;display:flex;justify-content:center;"></div>
      <button class="modal-btn" id="payBtn" disabled>选择支付方式后继续</button>
    </div>

    <!-- Step 2: Payment result -->
    <div class="modal-step" id="step-result">
      <div class="result-box" id="resultBox"></div>
    </div>
  </div>
</div>

<!-- My Orders Modal -->
<div class="modal-overlay" id="ordersModal">
  <div class="modal">
    <button class="modal-close" id="ordersModalClose">&times;</button>
    <h3>我的已购订单</h3>
    <p style="font-size:13px;color:var(--text-dim);margin-bottom:20px;">同一浏览器下所有已支付的订单。换浏览器或清缓存后，订单会丢失。</p>
    <div id="ordersContent" class="orders-content">
      <div class="loading"><span class="spinner"></span> 加载中...</div>
    </div>
  </div>
</div>

<footer>
  <div class="wrap">
    <div class="footer-meta">&copy; 2026 飞云 &middot; 让连接更自由</div>
    <div class="footer-links">
      <a href="tutorial.html#faq">常见问题</a>
      <a href="#">隐私政策</a>
    </div>
  </div>
</footer>

<script src="assets/nav.js"></script>
<script src="assets/pricing.js"></script>
</body>
</html>
